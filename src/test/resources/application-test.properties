# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway Configuration - disable for tests
spring.flyway.enabled=false

# Cache Configuration - disable for tests
spring.cache.type=none

# Allow bean definition overriding for test security configuration
spring.main.allow-bean-definition-overriding=true

# Security Configuration - disable for tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration

# Logging Configuration for Tests
logging.level.com.example.employee_management_system=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.jpa=WARN
logging.level.org.flywaydb=WARN
