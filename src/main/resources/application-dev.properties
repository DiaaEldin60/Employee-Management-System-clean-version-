# Development Configuration

# Application Configuration
spring.application.name=employee_management_system
server.port=8080
spring.main.banner-mode=off

# Database Configuration (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/EMS_Project?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=diaa_60
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.clean-on-startup=false

# Verification Code Expiry (in minutes)
app.email.verification.token.expiry.minutes=30
app.password.reset.token.expiry.minutes=15

# Brevo REST API Configuration
brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:}

# Debug logging to verify profile loading
logging.level.org.springframework.boot.context.config=DEBUG

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging Configuration (Development levels)
logging.level.com.example.employee_management_system=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Colored console output
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%thread]){magenta} %clr(%-5level){TRACE=magenta, DEBUG=cyan, INFO=green, WARN=yellow, ERROR=red} %clr(%logger{36}){cyan} - %msg%n

# Thymeleaf Configuration (cache disabled for development)
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Scheduling
spring.task.scheduling.pool.size=2

# Rate Limiting Configuration
bucket4j.cache.enabled=true
bucket4j.cache.size=10000
bucket4j.cache.ttl=3600

# Cache Configuration
spring.cache.type=jcache
spring.cache.jcache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.cache-names=employees,users,users-by-username,user-entities-by-username,user-entities-by-email,email-verification-tokens,password-reset-tokens,roles,authorities,departments,job-titles,paginated-employees,paginated-users,rate-limit-buckets,user-session-cache

# Error Page Configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
server.error.whitelabel.enabled=false
server.error.path=/error

# Favicon Configuration
spring.mvc.favicon.enabled=false
