<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<section>

    <form action="/change-password" method="post" th:object="${changePasswordRequest}">

        <!-- CSRF -->
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
        <h1>Change Your Password</h1>

        <!-- Error Message -->
        <div th:if="${error}" class="error-message" style="color: red; margin-bottom: 15px; text-align: center; padding: 10px; border: 1px solid #ff6b6b; background-color: #ffe0e0; border-radius: 5px;">
            <ion-icon name="warning-outline"></ion-icon>
            <span th:text="${error}">Error occurred</span>
        </div>

        <!-- NEW PASSWORD -->
        <div class="inputbox">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" th:field="*{newPassword}" required>
            <label>New Password</label>
        </div>
        <p style="color:red; font-size: 12px; margin-top: -10px; margin-bottom: 10px;" th:errors="*{newPassword}"></p>

        <!-- CONFIRM PASSWORD -->
        <div class="inputbox">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" th:field="*{passwordConfirm}" required>
            <label>Confirm Password</label>
        </div>
        <p style="color:red; font-size: 12px; margin-top: -10px; margin-bottom: 10px;" th:errors="*{passwordConfirm}"></p>

        <button type="submit">Change Password</button>

        <div class="register">
            <p><a href="/login" class="button-link">Back to Login</a></p>
        </div>

    </form>

</section>
</body>
</html>
