<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${pageDescription} ?: 'Employee Management System'">
    <title th:text="${pageTitle} ?: 'Employee Management System'">Employee Management System</title>
    <link rel="icon" href="data:;base64,=">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS (only include if needed) -->
    <link th:if="${includeDataTables}" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- Page-specific CSS (if any) -->
    <th:block th:if="${pageCss}">
        <link rel="stylesheet" th:href="@{/css/{pageCss}(pageCss=${pageCss})}">
    </th:block>
</head>

<body th:fragment="sidebar(activePage)">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-users-cog me-2"></i>EMS</h3>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" href="/dashboard">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:classappend="${activePage == 'employees' ? 'active' : ''}" href="/employees">
                        <i class="fas fa-users"></i> Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'leave-requests' ? 'active' : ''}" href="/leave-requests">
                        <i class="fas fa-calendar-alt"></i> Leave Requests
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}" href="/users">
                        <i class="fas fa-user-shield"></i> Users
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:classappend="${activePage == 'reports' ? 'active' : ''}" href="/reports">
                        <i class="fas fa-chart-bar"></i> Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'settings' ? 'active' : ''}" href="/settings">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</body>
</html>
