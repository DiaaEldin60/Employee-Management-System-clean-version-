<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle, includeDataTables, includeCharts, pageCss)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Employee Management System">
    <title th:text="${pageTitle} ?: 'Employee Management System'">Employee Management System</title>
    <link rel="icon" href="data:;base64,=">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link th:if="${includeDataTables}" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- Page-specific CSS -->
    <th:block th:if="${pageCss}">
        <link rel="stylesheet" th:href="@{/css/{pageCss}(pageCss=${pageCss})}">
    </th:block>
</head>

<body th:fragment="body(activePage, pageTitle, includeDataTables, includeCharts, pageJs)">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-users-cog me-2"></i>EMS</h3>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" href="/dashboard">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:classappend="${activePage == 'employees' ? 'active' : ''}" href="/employees">
                        <i class="fas fa-users"></i> Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'leave-requests' ? 'active' : ''}" href="/leave-requests">
                        <i class="fas fa-calendar-alt"></i> Leave Requests
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}" href="/users">
                        <i class="fas fa-user-shield"></i> Users
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:classappend="${activePage == 'reports' ? 'active' : ''}" href="/reports">
                        <i class="fas fa-chart-bar"></i> Reports
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'settings' ? 'active' : ''}" href="/settings">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="d-flex align-items-center">
                <button class="sidebar-toggle me-3" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-bar">
                    <h5 th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h5>
                </div>
            </div>
            <div class="user-menu">
                <div class="dropdown">
                    <button class="btn btn-light position-relative dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="fas fa-bell"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><h6 class="dropdown-header">Notifications</h6></li>
                        <li><a class="dropdown-item" href="#">No new notifications</a></li>
                    </ul>
                </div>
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-2"></i>
                        <span sec:authentication="name">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="container-fluid p-4" th:fragment="content">
            <th:block th:replace="~{::content}"></th:block>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center text-white">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Loading...</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery (only include if needed for DataTables) -->
    <script th:if="${includeDataTables}" src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- DataTables JS (only include if needed) -->
    <script th:if="${includeDataTables}" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script th:if="${includeDataTables}" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- Chart.js (only include if needed) -->
    <script th:if="${includeCharts}" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Common JavaScript -->
    <script th:src="@{/js/common.js}"></script>
    
    <!-- Page-specific JavaScript -->
    <th:block th:if="${pageJs}">
        <script th:src="@{/js/{pageJs}(pageJs=${pageJs})}"></script>
    </th:block>
</body>
</html>
