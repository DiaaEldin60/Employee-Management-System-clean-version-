# Production Configuration

# Application Configuration
spring.application.name=employee_management_system
server.port=8080
spring.main.banner-mode=off

# Database Configuration (from environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.clean-on-startup=false

# Verification Code Expiry (in minutes)
app.email.verification.token.expiry.minutes=${EMAIL_VERIFICATION_EXPIRY_MINUTES:30}
app.password.reset.token.expiry.minutes=${PASSWORD_RESET_EXPIRY_MINUTES:15}

# Brevo REST API Configuration
brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration (Production levels)
logging.level.com.example.employee_management_system=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.jpa=WARN
logging.level.org.flywaydb=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Colored console output
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%thread]){magenta} %clr(%-5level){TRACE=magenta, DEBUG=cyan, INFO=green, WARN=yellow, ERROR=red} %clr(%logger{36}){cyan} - %msg%n

# Thymeleaf Configuration (cache enabled for production)
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Scheduling
spring.task.scheduling.pool.size=2

# Rate Limiting Configuration
bucket4j.cache.enabled=true
bucket4j.cache.size=10000
bucket4j.cache.ttl=3600

# Cache Configuration
spring.cache.type=jcache
spring.cache.jcache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.cache-names=employees,users,users-by-username,user-entities-by-username,user-entities-by-email,email-verification-tokens,password-reset-tokens,roles,authorities,departments,job-titles,paginated-employees,paginated-users,rate-limit-buckets,user-session-cache

# Error Page Configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false
server.error.path=/error

# Favicon Configuration
spring.mvc.favicon.enabled=false

# Swagger/OpenAPI Configuration (disabled in production)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
